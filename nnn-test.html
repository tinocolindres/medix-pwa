<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Medix AI · Enfermería NNN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0f2e26; --paper:#f5f3ee; --surface:#ffffff;
    --teal:#0f766e; --teal-soft:#d7ece8; --teal-deep:#0b574f;
    --amber:#b45309; --amber-soft:#fbe6cf;
    --rose:#be123c; --rose-soft:#fbe0e6;
    --blue:#1d4ed8;
    --muted:#6b7280; --line:#e6e2d8;
    --shadow:0 1px 2px rgba(15,46,38,.06), 0 8px 24px rgba(15,46,38,.06);
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--ink); background:var(--paper);
    line-height:1.5; -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap{max-width:680px;margin:0 auto;padding:0 16px}

  /* Header */
  header{position:sticky;top:0;z-index:10;background:var(--ink);color:#eaf3f0;
    padding:14px 0 12px;box-shadow:0 6px 18px rgba(15,46,38,.18)}
  .brand{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .brand h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;margin:0;letter-spacing:.2px}
  .brand .tag{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:11px;
    color:#9fd3c8;border:1px solid #2e5e54;border-radius:999px;padding:2px 8px}
  .brand .ver{margin-left:auto;font-size:11px;color:#8fb8af}

  /* Verify banner */
  .verify{background:var(--amber-soft);color:#7c3a06;border:1px solid #f0d4a8;
    border-radius:12px;padding:9px 12px;margin:12px 0;font-size:12.5px;display:flex;gap:8px;align-items:flex-start}
  .verify b{font-weight:600}

  /* Filters */
  .chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;border:1px solid var(--line);background:var(--surface);color:var(--ink);
    font:inherit;font-size:13px;padding:7px 13px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.15s}
  .chip[aria-pressed="true"]{background:var(--ink);color:#eaf3f0;border-color:var(--ink)}

  .toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .search{flex:1;min-width:180px;position:relative}
  .search input{width:100%;font:inherit;font-size:15px;padding:11px 12px 11px 38px;border:1px solid var(--line);
    border-radius:12px;background:var(--surface);color:var(--ink)}
  .search input:focus{outline:2px solid var(--teal);outline-offset:1px;border-color:var(--teal)}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .seg{display:flex;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--surface)}
  .seg button{font:inherit;font-size:13px;padding:10px 13px;border:0;background:transparent;color:var(--muted);cursor:pointer}
  .seg button[aria-pressed="true"]{background:var(--teal-soft);color:var(--teal-deep);font-weight:600}

  .count{font-size:12px;color:var(--muted);margin:2px 2px 10px}

  /* Diagnosis list */
  .list{display:flex;flex-direction:column;gap:10px;padding-bottom:24px}
  .dx{display:flex;align-items:center;gap:12px;text-align:left;width:100%;
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:13px 14px;cursor:pointer;font:inherit;box-shadow:var(--shadow);transition:.15s}
  .dx:hover{transform:translateY(-1px);border-color:#cdd8d2}
  .dx:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  .code{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12px;color:var(--teal-deep);
    background:var(--teal-soft);border-radius:8px;padding:5px 8px;letter-spacing:.5px}
  .dx .body{flex:1;min-width:0}
  .dx .body .name{font-weight:600;font-size:15px}
  .dx .body .dom{font-size:12px;color:var(--muted);margin-top:1px}
  .dx .chev{color:#b7c2bc;flex:0 0 auto}

  .badge{font-family:'Space Grotesk',sans-serif;font-size:10.5px;font-weight:600;text-transform:uppercase;
    letter-spacing:.6px;border-radius:999px;padding:3px 8px;flex:0 0 auto}
  .badge.real{background:var(--teal-soft);color:var(--teal-deep)}
  .badge.riesgo{background:var(--rose-soft);color:var(--rose)}
  .badge.promocion{background:#dde7ff;color:var(--blue)}
  .badge.sindrome{background:#ece0fb;color:#6d28d9}

  /* Detail */
  #detail{display:none}
  .back{display:inline-flex;align-items:center;gap:6px;background:none;border:0;color:var(--teal-deep);
    font:inherit;font-size:14px;font-weight:500;padding:14px 0 6px;cursor:pointer}
  .dxhead{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;box-shadow:var(--shadow)}
  .dxhead .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .dxhead h2{font-family:'Space Grotesk',sans-serif;font-size:21px;margin:10px 0 2px;line-height:1.2}
  .dxhead .dom{font-size:13px;color:var(--muted)}
  .def{font-size:14px;margin-top:12px;color:#33453f}

  .block{margin-top:16px}
  .block h3{font-family:'Space Grotesk',sans-serif;font-size:12px;text-transform:uppercase;letter-spacing:.8px;
    color:var(--muted);margin:0 0 8px;display:flex;align-items:center;gap:8px}
  .block h3::after{content:"";height:1px;flex:1;background:var(--line)}
  .tags{display:flex;flex-wrap:wrap;gap:7px}
  .tags li{list-style:none;font-size:13px;background:var(--surface);border:1px solid var(--line);
    border-radius:9px;padding:6px 10px}

  /* NNN cards */
  .nnn{margin-top:22px}
  .nnn .lane{margin-top:14px}
  .lane-title{display:flex;align-items:center;gap:8px;font-family:'Space Grotesk',sans-serif;
    font-weight:600;font-size:14px}
  .pill{font-size:10.5px;font-weight:700;letter-spacing:.5px;border-radius:6px;padding:3px 7px;font-family:'Space Grotesk',sans-serif}
  .pill.noc{background:#e7f0ff;color:var(--blue)}
  .pill.nic{background:#ece3f7;color:#6d28d9}
  .care{display:flex;flex-direction:column;gap:9px;margin-top:9px}
  .care .item{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 13px;box-shadow:var(--shadow)}
  .care .item.noc{border-left:3px solid var(--blue)}
  .care .item.nic{border-left:3px solid #6d28d9}
  .care .item .h{display:flex;gap:9px;align-items:center}
  .care .item .h .c{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12px;color:var(--muted)}
  .care .item .h .t{font-weight:600;font-size:14px}
  .care .item .meta{font-size:12px;color:var(--muted);margin-top:3px}

  .empty{color:var(--muted);font-size:13px;padding:8px 0}
  .state{text-align:center;color:var(--muted);padding:40px 16px;font-size:14px}
  .state.err{color:var(--rose)}
  .state .fix{margin-top:10px;font-size:12.5px;color:var(--muted);background:var(--surface);
    border:1px solid var(--line);border-radius:10px;padding:10px 12px;text-align:left}
  .skeleton{height:64px;border-radius:var(--radius);background:linear-gradient(90deg,#eee9df,#f4f1ea,#eee9df);
    background-size:200% 100%;animation:sh 1.2s infinite}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  @media (prefers-reduced-motion:reduce){.skeleton{animation:none}.dx:hover{transform:none}}
</style>
</head>
<body>
<header>
  <div class="wrap brand">
    <h1>Medix AI · Enfermería</h1>
    <span class="tag">NANDA · NOC · NIC</span>
    <span class="ver" id="ver"></span>
  </div>
</header>

<main class="wrap">
  <!-- LISTA -->
  <section id="listView">
    <div class="verify" id="verifyBox">
      <span>⚠️</span>
      <span><b>Contenido de referencia.</b> Códigos y texto clínico requieren validación con ediciones oficiales licenciadas. No usar sin criterio profesional.</span>
    </div>

    <div class="chips" id="domainChips"></div>

    <div class="toolbar">
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="q" type="search" placeholder="Buscar diagnóstico o código…" oninput="onSearch()" autocomplete="off">
      </div>
      <div class="seg" id="tipoSeg">
        <button onclick="setTipo('', this)" aria-pressed="true">Todos</button>
        <button onclick="setTipo('real', this)" aria-pressed="false">Real</button>
        <button onclick="setTipo('riesgo', this)" aria-pressed="false">Riesgo</button>
      </div>
    </div>

    <div class="count" id="count"></div>
    <div class="list" id="list"></div>
  </section>

  <!-- DETALLE -->
  <section id="detail"></section>
</main>

<script>
  const API = "https://medix-ai-production.up.railway.app/api/v1/enfermeria/nnn";

  const state = { dominio:"", tipo:"", q:"" };
  let DOMAINS = {};           // id -> nombre
  let searchTimer = null;

  const esc = s => String(s ?? "").replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const tipoLabel = t => ({real:"Real",riesgo:"Riesgo",promocion:"Promoción",sindrome:"Síndrome"}[t]||t);

  // ---- arranque ----
  init();
  async function init(){
    showSkeleton();
    try{
      const [meta, doms] = await Promise.all([
        fetch(API+"/meta").then(r=>r.json()),
        fetch(API+"/dominios").then(r=>r.json())
      ]);
      const v = meta?.taxonomias?.nanda ? "v"+(meta.version||"") : "";
      document.getElementById("ver").textContent = v;
      DOMAINS = Object.fromEntries(doms.map(d=>[d.id, d.nombre]));
      renderDomainChips(doms);
      loadList();
    }catch(e){ showError(e); }
  }

  function renderDomainChips(doms){
    const el = document.getElementById("domainChips");
    el.innerHTML =
      `<button class="chip" aria-pressed="true" onclick="setDomain('',this)">Todos los dominios</button>` +
      doms.map(d=>`<button class="chip" aria-pressed="false" onclick="setDomain(${d.id},this)">${d.id}. ${esc(d.nombre)}</button>`).join("");
  }

  // ---- filtros ----
  function setDomain(id, btn){
    state.dominio = id;
    document.querySelectorAll("#domainChips .chip").forEach(c=>c.setAttribute("aria-pressed","false"));
    btn.setAttribute("aria-pressed","true");
    loadList();
  }
  function setTipo(t, btn){
    state.tipo = t;
    document.querySelectorAll("#tipoSeg button").forEach(b=>b.setAttribute("aria-pressed","false"));
    btn.setAttribute("aria-pressed","true");
    loadList();
  }
  function onSearch(){
    clearTimeout(searchTimer);
    searchTimer = setTimeout(()=>{ state.q = document.getElementById("q").value.trim(); loadList(); }, 250);
  }

  // ---- lista ----
  async function loadList(){
    const params = new URLSearchParams();
    if(state.dominio!=="") params.set("dominio", state.dominio);
    if(state.tipo)         params.set("tipo", state.tipo);
    if(state.q)            params.set("q", state.q);
    showSkeleton();
    try{
      const dx = await fetch(API+"/diagnosticos?"+params.toString()).then(r=>r.json());
      renderList(dx);
    }catch(e){ showError(e); }
  }

  function renderList(dx){
    const list = document.getElementById("list");
    document.getElementById("count").textContent =
      `${dx.length} diagnóstico${dx.length===1?"":"s"}`;
    if(!dx.length){ list.innerHTML = `<div class="state">Sin resultados para este filtro.</div>`; return; }
    list.innerHTML = dx.map(d=>`
      <button class="dx" onclick="openDetail('${esc(d.codigo)}')">
        <span class="code">${esc(d.codigo)}</span>
        <span class="body">
          <span class="name">${esc(d.etiqueta)}</span>
          <span class="dom">Dominio ${d.dominio} · ${esc(DOMAINS[d.dominio]||"")}</span>
        </span>
        <span class="badge ${esc(d.tipo)}">${esc(tipoLabel(d.tipo))}</span>
        <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      </button>`).join("");
  }

  // ---- detalle ----
  async function openDetail(codigo){
    window.scrollTo({top:0});
    document.getElementById("listView").style.display="none";
    const d = document.getElementById("detail");
    d.style.display="block";
    d.innerHTML = `<div class="state">Cargando ${esc(codigo)}…</div>`;
    try{
      const data = await fetch(API+"/diagnosticos/"+encodeURIComponent(codigo)).then(r=>{
        if(!r.ok) throw new Error("No encontrado"); return r.json();
      });
      renderDetail(data);
    }catch(e){
      d.innerHTML = `<button class="back" onclick="backToList()">← Volver</button>
        <div class="state err">No se pudo cargar el diagnóstico.</div>`;
    }
  }

  function tagList(title, arr){
    if(!arr || !arr.length) return "";
    return `<div class="block"><h3>${title}</h3><ul class="tags">${
      arr.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div>`;
  }

  function renderDetail(data){
    const dx = data.diagnostico;
    const noc = data.noc||[], nic = data.nic||[];
    const isRiesgo = dx.tipo==="riesgo";

    const nocCards = noc.length ? noc.map(n=>`
      <div class="item noc">
        <div class="h"><span class="c">${esc(n.codigo)}</span><span class="t">${esc(n.etiqueta)}</span></div>
        <div class="meta">${esc(n.dominio||"")}${n.clase?" · "+esc(n.clase):""} · ${esc(n.escala||"Likert 1-5")}</div>
      </div>`).join("") : `<div class="empty">Sin resultados NOC sugeridos.</div>`;

    const nicCards = nic.length ? nic.map(n=>`
      <div class="item nic">
        <div class="h"><span class="c">${esc(n.codigo)}</span><span class="t">${esc(n.etiqueta)}</span></div>
        <div class="meta">${esc(n.campo||"")}${n.clase?" · "+esc(n.clase):""}</div>
      </div>`).join("") : `<div class="empty">Sin intervenciones NIC sugeridas.</div>`;

    document.getElementById("detail").innerHTML = `
      <button class="back" onclick="backToList()">← Diagnósticos</button>
      <div class="dxhead">
        <div class="top">
          <span class="code">${esc(dx.codigo)}</span>
          <span class="badge ${esc(dx.tipo)}">${esc(tipoLabel(dx.tipo))}</span>
        </div>
        <h2>${esc(dx.etiqueta)}</h2>
        <div class="dom">Dominio ${dx.dominio} · ${esc(DOMAINS[dx.dominio]||"")}${dx.clase?" · "+esc(dx.clase):""}</div>
        ${dx.definicion?`<p class="def">${esc(dx.definicion)}</p>`:""}
      </div>

      ${isRiesgo
        ? tagList("Factores de riesgo", dx.factores_riesgo) + tagList("Población de riesgo", dx.poblacion_riesgo)
        : tagList("Características definitorias", dx.caracteristicas_definitorias) + tagList("Factores relacionados", dx.factores_relacionados)}

      <div class="nnn">
        <div class="lane">
          <div class="lane-title"><span class="pill noc">NOC</span> Resultados / objetivos</div>
          <div class="care">${nocCards}</div>
        </div>
        <div class="lane">
          <div class="lane-title"><span class="pill nic">NIC</span> Intervenciones</div>
          <div class="care">${nicCards}</div>
        </div>
      </div>
      <div style="height:32px"></div>`;
  }

  function backToList(){
    document.getElementById("detail").style.display="none";
    document.getElementById("listView").style.display="block";
  }

  // ---- estados ----
  function showSkeleton(){
    document.getElementById("count").textContent = "";
    document.getElementById("list").innerHTML =
      Array.from({length:5}).map(()=>`<div class="skeleton"></div>`).join("");
  }
  function showError(e){
    document.getElementById("list").innerHTML = `
      <div class="state err">No se pudieron cargar los datos.
        <div class="fix">Si abriste este archivo con doble clic (<code>file://</code>), el backend
        bloquea ese origen por <b>CORS</b>. Súbelo a tu repo y ábrelo desde una URL autorizada
        (github.io / Netlify), o sírvelo desde un origen permitido.</div>
      </div>`;
    console.error(e);
  }
</script>
</body>
</html>
